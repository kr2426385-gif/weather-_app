<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f2f2f2;
    }

    .box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    input {
      padding: 8px;
      width: 70%;
    }

    button {
      padding: 8px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: darkblue;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Weather App</h2>
  <input type="text" id="city" placeholder="Enter city name">
  <button onclick="getWeather()">Check</button>
  <div id="result"></div>
</div>

<script>
function getWeather() {

    var cityName = document.getElementById("city").value;

    var url = "https://api.openweathermap.org/data/2.5/weather?q=" 
              + cityName + 
              "&appid=8b836c49985e07498b8fa44ae09a0b86&units=metric";

    fetch(url)
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        var temperature = data.main.temp;

        document.getElementById("result").innerHTML =
            "Temperature in " + cityName + " is " + temperature + "°C";
    })
    .catch(function() {
        document.getElementById("result").innerHTML =
            "City not found!";
    });
}
</script>

</body>
</html>
